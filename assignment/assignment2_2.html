<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h2>Registration Form</h2>
<form action="#">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required><br><br>
    <label>Gender:</label>
    <input type="radio" id="male" name="gender" value="Male" required>
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="Female" required>
    <label for="female">Female</label><br><br>
    <label for="languages">LANGUAGES:</label><br>
        <input type="checkbox" name="languages" value="HTML" id="html">HTML<br>
        <input type="checkbox" name="languages" value="C++" id="cpp">C++<br>
        <input type="checkbox" name="languages" value="PYTHON" id="python">PYTHON<br>
        <input type="checkbox" name="languages" value="JAVA" id="java">JAVA <br><br>
    <label for="country">Country:</label>
    <select id="country" name="country">
        <option value="Select a country">Select a country</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="UK">UK</option>
        <option value="Canada">Canada</option>
    </select><br><br>
    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob"><br><br>
    <label for="file">Upload Resume:</label>
    <input type="file" id="file" name="file"><br><br>
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>
    <input type="submit" value="Register">
</form>
</body>
</html>
